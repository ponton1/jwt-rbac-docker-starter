services:
  db:
    image: postgres:15-alpine
    platform: linux/arm64
    container_name: jwt_rbac_db
    environment:
      POSTGRES_DB: jwt_rbac_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - jwt_rbac_pgdata:/var/lib/postgresql/data
      - ./docker/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d jwt_rbac_db']
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    platform: linux/arm64
    container_name: jwt_rbac_api
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: jwt_rbac_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  jwt_rbac_pgdata:
