services:
  db:
    image: postgres:15-alpine
    container_name: jwt_rbac_db
    environment:
      POSTGRES_DB: jwt_rbac_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - jwt_rbac_pgdata:/var/lib/postgresql/data
      - ./docker/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d jwt_rbac_db']
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jwt_rbac_api
    environment:
      NODE_ENV: development
      PORT: 3000

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: jwt_rbac_db
      DB_USER: postgres
      DB_PASSWORD: postgres

      # Watchers en Docker (Mac/Windows)
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  jwt_rbac_pgdata:
